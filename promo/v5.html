    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #111;
            --bg: #0A0A0A;
            --yellow: #FFD700;
            --yellow-dim: rgba(255, 215, 0, 0.35);
            --purple: #9B30FF;
            --purple-dark: #6A1B9A;
            --pink: #FF1493;
            --line-green: #06C755;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
            position: relative;
        }

        /* Noise overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        /* Ambient purple glow top */
        body::after {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 140%;
            height: 80%;
            background: radial-gradient(ellipse at center, rgba(155, 48, 255, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .page-wrap {
            width: 100%;
            max-width: 440px;
            padding: 20px 16px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        /* ── Main card ── */
        .card {
            width: 100%;
            background: var(--black);
            position: relative;
            padding: 32px 20px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Torn / rough border via layered box-shadows and clip jaggedness */
        .card::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(135deg, var(--purple), var(--pink), var(--purple), var(--yellow), var(--purple));
            background-size: 300% 300%;
            animation: borderShift 6s ease infinite;
            z-index: -1;
            /* Rough torn edge via clip-path with many jagged points */
            clip-path: polygon(
                0% 2%, 3% 0%, 7% 3%, 11% 0%, 15% 2%, 19% 0%, 23% 3%, 27% 1%, 31% 0%, 35% 2%, 39% 0%, 43% 3%, 47% 1%, 51% 0%, 55% 2%, 59% 0%, 63% 3%, 67% 0%, 71% 2%, 75% 0%, 79% 3%, 83% 1%, 87% 0%, 91% 2%, 95% 0%, 98% 3%, 100% 0%,
                100% 4%, 98% 7%, 100% 11%, 98% 15%, 100% 19%, 98% 23%, 100% 27%, 99% 31%, 100% 35%, 98% 39%, 100% 43%, 98% 47%, 100% 51%, 99% 55%, 100% 59%, 98% 63%, 100% 67%, 99% 71%, 100% 75%, 98% 79%, 100% 83%, 99% 87%, 100% 91%, 98% 95%, 100% 98%,
                98% 100%, 95% 98%, 91% 100%, 87% 98%, 83% 100%, 79% 98%, 75% 100%, 71% 98%, 67% 100%, 63% 98%, 59% 100%, 55% 98%, 51% 100%, 47% 98%, 43% 100%, 39% 98%, 35% 100%, 31% 98%, 27% 100%, 23% 98%, 19% 100%, 15% 98%, 11% 100%, 7% 98%, 3% 100%, 0% 98%,
                2% 95%, 0% 91%, 2% 87%, 0% 83%, 2% 79%, 0% 75%, 1% 71%, 0% 67%, 2% 63%, 0% 59%, 1% 55%, 0% 51%, 2% 47%, 0% 43%, 1% 39%, 0% 35%, 2% 31%, 0% 27%, 1% 23%, 0% 19%, 2% 15%, 0% 11%, 1% 7%, 0% 3%
            );
        }

        /* Pulsing glow behind the card */
        .card::after {
            content: '';
            position: absolute;
            inset: -12px;
            background: transparent;
            box-shadow:
                0 0 30px rgba(155, 48, 255, 0.3),
                0 0 60px rgba(155, 48, 255, 0.15),
                0 0 100px rgba(255, 20, 147, 0.1);
            z-index: -2;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes borderShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes pulseGlow {
            0%, 100% {
                box-shadow:
                    0 0 30px rgba(155, 48, 255, 0.3),
                    0 0 60px rgba(155, 48, 255, 0.15),
                    0 0 100px rgba(255, 20, 147, 0.1);
            }
            50% {
                box-shadow:
                    0 0 40px rgba(155, 48, 255, 0.5),
                    0 0 80px rgba(155, 48, 255, 0.25),

        /* ── Header text ── */
        .header-unlock {

            font-size: clamp(42px, 12vw, 60px);
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1;
            text-shadow:

            text-align: center;

            inset: 0;
            background: var(--yellow);

            font-size: 13px;
            color: rgba(0,0,0,0.65);
            font-weight: 700;
        }

        .scratch-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            touch-action: none;
        }

        .scratch-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 3;
            transition: opacity 0.4s;
        }

        .scratch-hint span {
            font-family: 'Rubik Mono One', monospace;
            font-size: clamp(22px, 6vw, 30px);
            color: rgba(155, 48, 255, 0.35);
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(155, 48, 255, 0.2);
            animation: hintPulse 2s ease-in-out infinite;
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.04); }
        }

        /* ── Post-reveal state ── */
        .result-area {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 320px;
        }

        .result-area.visible {
            display: flex;
            animation: revealSlide 0.5s ease-out;
        }

        @keyframes revealSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-family: 'Bungee', cursive;
            font-size: 36px;

            text-shadow:

        .line-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            background: var(--line-green);
            color: #fff;

            border-radius: 50px;

        }

        .line-btn:active {

        }

        .line-btn svg {
            width: 26px;

            flex-shrink: 0;

        /* ── Brand pills ── */
        .brands-strip {
            width: 100vw;
            overflow: hidden;
            margin-top: 28px;
            padding: 8px 0;
            position: relative;
        }

        .brands-strip::before,
        .brands-strip::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40px;
            z-index: 3;

        .brands-strip::before {

            background: linear-gradient(to right, var(--bg), transparent);
        }

        .brands-strip::after {

        .brands-track {

        .brand-pill {

        }

            .card { padding: 40px 28px 32px; }
        }
    </style>

<script>
(function() {
    'use strict';

    // ── Scratch card ──
    const zone = document.getElementById('scratchZone');
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('scratchHint');
    const resultArea = document.getElementById('resultArea');

    let isDrawing = false;
    let revealed = false;
    let hasStarted = false;

    function initCanvas() {
        const rect = zone.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        drawHolographicSurface(rect.width, rect.height);
    }

    function drawHolographicSurface(w, h) {
        // Base black
        ctx.fillStyle = '#0D0D0D';
        ctx.fillRect(0, 0, w, h);

        // Shimmer gradients — iridescent purple/yellow metallic
        const g1 = ctx.createLinearGradient(0, 0, w, h);
        g1.addColorStop(0, 'rgba(155, 48, 255, 0.15)');
        g1.addColorStop(0.3, 'rgba(255, 215, 0, 0.1)');
        g1.addColorStop(0.5, 'rgba(155, 48, 255, 0.2)');
        g1.addColorStop(0.7, 'rgba(255, 20, 147, 0.08)');
        g1.addColorStop(1, 'rgba(255, 215, 0, 0.15)');
        ctx.fillStyle = g1;
        ctx.fillRect(0, 0, w, h);

        // Diagonal shimmer bands
        ctx.save();
        for (let i = -h; i < w + h; i += 18) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i + h, h);
            const alpha = 0.02 + Math.random() * 0.04;
            const colors = ['rgba(155,48,255,', 'rgba(255,215,0,', 'rgba(255,20,147,'];
            ctx.strokeStyle = colors[Math.floor(Math.random() * 3)] + alpha + ')';
            ctx.lineWidth = 1 + Math.random() * 3;
            ctx.stroke();
        }
        ctx.restore();

        // Central radial highlight
        const g2 = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w * 0.6);
        g2.addColorStop(0, 'rgba(155, 48, 255, 0.08)');
        g2.addColorStop(0.5, 'rgba(255, 215, 0, 0.04)');
        g2.addColorStop(1, 'transparent');
        ctx.fillStyle = g2;
        ctx.fillRect(0, 0, w, h);

        // Fine noise grain
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const noise = (Math.random() - 0.5) * 16;
            data[i] += noise;
            data[i + 1] += noise;
            data[i + 2] += noise;
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        return {
            x: touch.clientX - rect.left,
            y: touch.clientY - rect.top
        };
    }

    function scratch(pos) {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 34, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
    }

    function checkReveal() {
        if (revealed) return;
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        let transparent = 0;
        const total = data.length / 4;
        for (let i = 3; i < data.length; i += 4) {
            if (data[i] < 128) transparent++;
        }
        if (transparent / total > 0.28) {
            revealCard();
        }
    }

    function revealCard() {
        revealed = true;
        canvas.style.transition = 'opacity 0.5s';
        canvas.style.opacity = '0';
        hint.style.opacity = '0';
        setTimeout(() => {
            zone.style.display = 'none';
            resultArea.classList.add('visible');
        }, 500);
        fireConfetti();
        if (navigator.vibrate) navigator.vibrate([50, 30, 80, 30, 100]);
    }

    function onStart(e) {
        e.preventDefault();
        isDrawing = true;
        if (!hasStarted) {
            hasStarted = true;
            hint.style.opacity = '0';
        }
        const pos = getPos(e);
        scratch(pos);
    }

    function onMove(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        scratch(pos);
    }

    function onEnd() {
        isDrawing = false;
        checkReveal();
    }

    canvas.addEventListener('mousedown', onStart);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onEnd);
    canvas.addEventListener('mouseleave', onEnd);
    canvas.addEventListener('touchstart', onStart, { passive: false });
    canvas.addEventListener('touchmove', onMove, { passive: false });
    canvas.addEventListener('touchend', onEnd);

    // ── Confetti: yellow & purple sparks ──
    function fireConfetti() {
        const c = document.getElementById('confetti-canvas');
        const cx = c.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        c.width = window.innerWidth * dpr;
        c.height = window.innerHeight * dpr;
        cx.scale(dpr, dpr);
        c.style.width = window.innerWidth + 'px';
        c.style.height = window.innerHeight + 'px';

        const colors = ['#FFD700', '#9B30FF', '#FF1493', '#FFD700', '#FFD700', '#9B30FF'];
        const particles = [];

        for (let i = 0; i < 120; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 4 + Math.random() * 8;
            particles.push({
                x: window.innerWidth / 2 + (Math.random() - 0.5) * 100,
                y: window.innerHeight * 0.4,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 4,
                size: 2 + Math.random() * 5,
                color: colors[Math.floor(Math.random() * colors.length)],
                alpha: 1,
                rotation: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 12,
                shape: Math.random() > 0.5 ? 'rect' : 'circle',
                gravity: 0.12 + Math.random() * 0.08,
                decay: 0.012 + Math.random() * 0.008
            });
        }

        function animateConfetti() {
            cx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            let alive = false;

            for (const p of particles) {
                if (p.alpha <= 0) continue;
                alive = true;
                p.x += p.vx;
                p.vy += p.gravity;
                p.y += p.vy;
                p.alpha -= p.decay;
                p.rotation += p.rotSpeed;
                p.vx *= 0.99;

                cx.save();
                cx.translate(p.x, p.y);
                cx.rotate(p.rotation * Math.PI / 180);
                cx.globalAlpha = Math.max(0, p.alpha);

                if (p.shape === 'rect') {
                    cx.fillStyle = p.color;
                    cx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 1.8);
                } else {
                    cx.beginPath();
                    cx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                    cx.fillStyle = p.color;
                    cx.fill();
                }

                // Glow
                cx.shadowColor = p.color;
                cx.shadowBlur = 6;

                cx.restore();
            }

            if (alive) requestAnimationFrame(animateConfetti);
        }

        animateConfetti();
    }

    // ── Init ──
    initCanvas();
    window.addEventListener('resize', () => {
        if (!revealed) initCanvas();
    });
})();
</script>
</body>
